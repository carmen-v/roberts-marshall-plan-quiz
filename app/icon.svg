<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32">
  <!-- Blue background -->
  <rect width="32" height="32" fill="#003399"/>
  <!-- Reusable 5-pointed star shape, centred at origin -->
  <defs>
    <polygon id="s"
      points="0,-2 0.47,-0.65 1.9,-0.62 0.76,0.25 1.18,1.62 0,0.8 -1.18,1.62 -0.76,0.25 -1.9,-0.62 -0.47,-0.65"
      fill="#FFCC00"/>
  </defs>
  <!-- 12 stars on a circle of radius 10, starting at the top, clockwise -->
  <use href="#s" transform="translate(16,6)"/>
  <use href="#s" transform="translate(21,7.34)"/>
  <use href="#s" transform="translate(24.66,11)"/>
  <use href="#s" transform="translate(26,16)"/>
  <use href="#s" transform="translate(24.66,21)"/>
  <use href="#s" transform="translate(21,24.66)"/>
  <use href="#s" transform="translate(16,26)"/>
  <use href="#s" transform="translate(11,24.66)"/>
  <use href="#s" transform="translate(7.34,21)"/>
  <use href="#s" transform="translate(6,16)"/>
  <use href="#s" transform="translate(7.34,11)"/>
  <use href="#s" transform="translate(11,7.34)"/>
</svg>
